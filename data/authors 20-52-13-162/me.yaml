  - role: 科研助理
    org: 安徽医科大学神经工程实验室
    start: 2024-09-01
    summary: |
      研究个性化各向异性电导率建模用于时域干涉刺激（TIS）。
      利用 MRI 数据（MPRAGE、DTI）结合 NODDI 模型估算微结构参数，
      重构个性化电导率张量。在 COMSOL 中进行有限元仿真，
      比较各向同性与各向异性电导率模型的电场分布差异。
    button:
