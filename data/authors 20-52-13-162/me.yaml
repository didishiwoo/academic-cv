  - role: 项目负责人（省级大创）
    org: 安徽医科大学
    start: 2025-06-01
    summary: |
      主持研制四通道经颅时域干涉刺激系统（"智控脑阈"）。
      设计增强型霍兰德压控恒流源（1-100kHz、0-5mA、精度≤1%）。
      开发 STM32 嵌入式固件（IIC 通信、OLED 显示、闭环控制）。
      基于 PySide6 开发上位机控制软件。已提交软著申请。
