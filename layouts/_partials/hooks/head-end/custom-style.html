<style>
  /* ── Base Typography ── */
  body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Section Heading (markdown block title) ── */
  .flex.flex-col.items-center.max-w-prose.mx-auto > .mb-6.text-3xl {
    position: relative;
    margin-bottom: 2rem !important;
    font-size: 1.75rem !important;
    letter-spacing: -0.02em;
  }

  .flex.flex-col.items-center.max-w-prose.mx-auto > .mb-6.text-3xl::after {
    content: '';
    display: block;
    width: 2.5rem;
    height: 3px;
    background: linear-gradient(90deg, var(--primary-500, #2563eb), var(--primary-300, #93c5fd));
    border-radius: 2px;
    margin-top: 0.5rem;
  }

  /* ── Section Content Container (markdown blocks) ── */
  .flex.flex-col.items-center.max-w-prose.mx-auto {
    padding-top: 2rem;
    padding-bottom: 2rem;
  }

  /* ── Research Entry Cards ── */
  .research-entry {
    position: relative;
    padding: 1.75rem 1.5rem;
    margin-bottom: 1.25rem;
    background: linear-gradient(135deg, #f8faff 0%, #ffffff 100%);
    border: 1px solid #e8edf5;
    border-radius: 0.75rem;
    transition: all 0.25s ease;
  }

  .dark .research-entry {
    background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.6) 100%);
    border-color: rgba(71, 85, 105, 0.5);
  }

  .research-entry:hover {
    border-color: #bfdbfe;
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.08);
    transform: translateY(-1px);
  }

  .dark .research-entry:hover {
    border-color: rgba(96, 165, 250, 0.3);
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.12);
  }

  .research-entry .research-title {
    font-size: 1.125rem;
    font-weight: 700;
    color: #1e293b;
    line-height: 1.5;
    margin-bottom: 0.375rem;
  }

  .dark .research-entry .research-title {
    color: #e2e8f0;
  }

  .research-entry .research-date {
    display: inline-block;
    font-size: 0.8125rem;
    font-weight: 500;
    color: #64748b;
    background: #f1f5f9;
    padding: 0.2rem 0.75rem;
    border-radius: 999px;
    margin-bottom: 0.75rem;
  }

  .dark .research-entry .research-date {
    color: #94a3b8;
    background: rgba(51, 65, 85, 0.6);
  }

  .research-entry .research-desc {
    font-size: 0.9375rem;
    line-height: 1.7;
    color: #475569;
  }

  .dark .research-entry .research-desc {
    color: #cbd5e1;
  }

  .research-entry .research-desc strong {
    color: #1e40af;
    font-weight: 600;
  }

  .dark .research-entry .research-desc strong {
    color: #93c5fd;
  }

  .research-entry .research-desc ul {
    padding-left: 1.25rem;
    margin: 0.5rem 0;
  }

  .research-entry .research-desc li {
    margin-bottom: 0.25rem;
  }

  /* ── Awards List ── */
  .award-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .award-list li {
    position: relative;
    padding: 1rem 1rem 1rem 1.25rem;
    margin-bottom: 0.75rem;
    background: #fafcff;
    border: 1px solid #eef2f7;
    border-radius: 0.625rem;
    font-size: 0.9375rem;
    line-height: 1.65;
    color: #334155;
    transition: all 0.2s ease;
  }

  .dark .award-list li {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(71, 85, 105, 0.35);
    color: #cbd5e1;
  }

  .award-list li:hover {
    border-color: #bfdbfe;
    background: #f0f7ff;
    transform: translateX(2px);
  }

  .dark .award-list li:hover {
    border-color: rgba(96, 165, 250, 0.25);
    background: rgba(30, 58, 95, 0.3);
  }

  .award-list li strong {
    color: #1e293b;
    font-weight: 600;
  }

  .dark .award-list li strong {
    color: #f1f5f9;
  }

  /* ── Bio Text ── */
  .bio-text {
    font-size: 1rem;
    line-height: 1.85;
    color: #334155;
  }

  .dark .bio-text {
    color: #cbd5e1;
  }

  .bio-text p {
    margin-bottom: 0.75rem;
  }

  .bio-text p:last-child {
    margin-bottom: 0;
  }

  .bio-text strong {
    color: #1e40af;
    font-weight: 600;
  }

  .dark .bio-text strong {
    color: #93c5fd;
  }

  /* ── Publication Cards (citation view) ── */
  .pub-list-item.view-citation {
    padding: 1.25rem 1.5rem;
    margin-bottom: 0.75rem !important;
    background: #fafcff;
    border: 1px solid #eef2f7;
    border-radius: 0.75rem;
    transition: all 0.2s ease;
    font-size: 0.9375rem;
    line-height: 1.65;
  }

  .pub-list-item.view-citation:hover {
    border-color: #bfdbfe;
    box-shadow: 0 2px 12px rgba(37, 99, 235, 0.06);
  }

  .dark .pub-list-item.view-citation {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(71, 85, 105, 0.35);
    color: #cbd5e1;
  }

  .dark .pub-list-item.view-citation:hover {
    border-color: rgba(96, 165, 250, 0.25);
  }

  .pub-list-item.view-citation a {
    font-weight: 500;
  }

  .pub-list-item.view-citation .article-metadata {
    color: #64748b;
  }

  .dark .pub-list-item.view-citation .article-metadata {
    color: #94a3b8;
  }

  .pub-list-item .pub-icon {
    display: none;
  }

  /* ── Photography Gallery ── */
  .photo-gallery {
    width: 100%;
  }

  /* suppress prose interference */
  .prose .photo-gallery,
  .prose-lg .photo-gallery {
    max-width: none;
  }

  .prose .photo-gallery h4,
  .prose-lg .photo-gallery h4 {
    margin-top: 0;
    margin-bottom: 0.75rem;
    font-size: 1.05rem;
  }

  .prose .photo-gallery img,
  .prose-lg .photo-gallery img {
    margin-top: 0;
    margin-bottom: 0;
  }

  .prose .photo-gallery p,
  .prose-lg .photo-gallery p {
    margin-top: 0;
    margin-bottom: 0;
  }

  .photo-gallery-intro {
    font-size: 1rem;
    color: #64748b;
    margin-bottom: 2rem;
    text-align: center;
    font-style: italic;
  }

  .dark .photo-gallery-intro {
    color: #94a3b8;
  }

  .photo-location {
    margin-bottom: 2rem;
  }

  .photo-location-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: #334155;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #e2e8f0;
  }

  .dark .photo-location-title {
    color: #e2e8f0;
    border-bottom-color: #334155;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.75rem;
  }

  .photo-item {
    display: block;
    border-radius: 0.5rem;
    overflow: hidden;
    border: 1px solid #e8edf5;
    transition: all 0.25s ease;
    aspect-ratio: 3 / 2;
    background: #f1f5f9;
  }

  .dark .photo-item {
    border-color: #334155;
    background: #1e293b;
  }

  .photo-item:hover {
    border-color: #bfdbfe;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.12);
    transform: scale(1.02);
  }

  .dark .photo-item:hover {
    border-color: rgba(96, 165, 250, 0.3);
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.2);
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .photo-item:hover img {
    transform: scale(1.05);
  }

  @media (max-width: 640px) {
    .photo-grid {
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.5rem;
    }
  }

  /* ── Smooth Scrollbar ── */
  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
  }

  .dark ::-webkit-scrollbar-thumb {
    background: #475569;
  }

  .dark ::-webkit-scrollbar-thumb:hover {
    background: #64748b;
  }

  /* ── Gradient Mesh Background for hero ── */
  .resume-biography {
    position: relative;
  }

  .resume-biography::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .resume-biography::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .resume-biography > .max-w-7xl {
    position: relative;
    z-index: 1;
  }

  /* ── Research Fit Block ── */
  .research-fit-block {
    background: linear-gradient(135deg, #f0f7ff 0%, #e8f0fe 100%);
    border-left: 4px solid #2563eb;
    border-radius: 0.75rem;
    padding: 1.75rem 2rem;
    margin: 1.5rem 0;
    box-shadow: 0 1px 3px rgba(37, 99, 235, 0.06);
  }

  .dark .research-fit-block {
    background: linear-gradient(135deg, rgba(30, 58, 95, 0.4) 0%, rgba(23, 37, 84, 0.3) 100%);
    border-left-color: #3b82f6;
  }

  .research-fit-block p:last-child {
    margin-bottom: 0;
  }

  /* ── Section Separator line ── */
  .section-separator {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d1d9e6, transparent);
    margin: 0.5rem auto;
    max-width: 80%;
  }

  .dark .section-separator {
    background: linear-gradient(90deg, transparent, rgba(71, 85, 105, 0.5), transparent);
  }

  /* ── Smooth anchor scrolling ── */
  [id] {
    scroll-margin-top: 5rem;
  }

  /* ── Responsive Refinements ── */
  @media (max-width: 640px) {
    .research-entry {
      padding: 1.25rem 1rem;
    }

    .award-list li {
      padding: 0.875rem 0.875rem 0.875rem 1rem;
    }

    .flex.flex-col.items-center.max-w-prose.mx-auto > .mb-6.text-3xl {
      font-size: 1.35rem !important;
    }

    .flex.flex-col.items-center.max-w-prose.mx-auto > .mb-6.text-3xl::after {
      width: 2rem;
    }
  }

  /* ── Print Styles ── */
  @media print {
    .navbar, .footer {
      display: none !important;
    }

    body {
      font-size: 10pt;
      color: #000;
      background: #fff;
    }

    .research-entry, .award-list li, .pub-list-item.view-citation {
      break-inside: avoid;
      border: 1px solid #ddd;
      box-shadow: none;
      background: #fff;
    }

    .resume-biography::before,
    .resume-biography::after {
      display: none;
    }
  }
</style>
